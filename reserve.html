<!-- FULLSCREEN RESERVATION HERO -->
<section class="reserve-hero">

  <div class="reserve-form-wrapper">
    <h2>Reserve Your Table</h2>
    <p>Perfect ambience • Fresh meals • Unforgettable experience</p>

    <div class="reserve-grid">

      <!-- Name -->
      <div class="floating-group">
        <label>Your Name *</label>
        <input id="resName" type="text">
      </div>

      <!-- Phone -->
      <div class="floating-group">
        <label>Phone Number *</label>
        <input id="resPhone" type="text">
      </div>

      <!-- Date -->
      <div class="floating-group">
        <label>Date *</label>
        <input id="resDate" type="date">
      </div>

      <!-- Time -->
      <div class="floating-group">
        <label>Time *</label>
        <input id="resTime" type="time">
      </div>

      <!-- Table Number -->
      <div class="floating-group">
        <label>Table Number *</label>
        <select id="resTableNo">
          <option value=""></option>
          <option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5</option><option>6</option>
          <option>7</option><option>8</option>
        </select>
      </div>

      <!-- Guests -->
      <div class="floating-group">
        <label>Number of Guests *</label>
        <select id="resGuests">
          <option value=""></option>
          <option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5</option><option>6</option>
          <option>7</option><option>8</option>
        </select>
      </div>

      <!-- Notes -->
      <div class="floating-group" style="grid-column: span 2;">
        <label>Special Request</label>
        <textarea id="resNotes" rows="4"></textarea>
      </div>

    </div>

    <button class="btn reserve-btn" style="width:100%; margin-top:18px; background-color:#d35400;" onclick="reserveNow()">
      Confirm Reservation
    </button>

    <div class="info-tags">
      <div class="info-tag"><i class="fa fa-mug-hot"></i> Cozy Ambience</div>
      <div class="info-tag"><i class="fa fa-plate-wheat"></i> Fresh Food</div>
      <div class="info-tag"><i class="fa fa-wifi"></i> Free Wi-Fi</div>
      <div class="info-tag"><i class="fa fa-couch"></i> Comfortable Seating</div>
    </div>

  </div>

</section>

<script>
function reserveNow() {
  const name = $("resName").value;
  const phone = $("resPhone").value;
  const date = $("resDate").value;
  const time = $("resTime").value;
  const table = $("resTableNo").value;
  const guests = $("resGuests").value;
  const notes = $("resNotes").value;

  if(!name || !phone || !date || !time || !table || !guests){
    alert("Please fill all required fields");
    return;
  }

  let reservations = load("e11_reservations", []);

  reservations.push({
    id: uid("res"),
    name,
    phone,
    date,
    time,
    table,
    guests,
    notes,
    status: "requested",  // ⭐ ADDED
    created: new Date().toISOString()
  });

  save("e11_reservations", reservations);
  alert("Reservation submitted!");
}



</script>
