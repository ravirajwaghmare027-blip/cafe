<!DOCTYPE html>
<html>
<head>
  <title>Admin Login — E11ven Cafe</title>
  <link rel="stylesheet" href="css/style.css">
 <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <style>
    body{
      background:url('https://images.unsplash.com/photo-1498654896293-37aacf113fd9?auto=format&fit=crop&w=1400&q=60')
        center/cover no-repeat;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.55);
      backdrop-filter:blur(4px);
    }

    .login-card{
      position:relative;
      width:360px;
      padding:28px;
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.25);
      border-radius:20px;
      box-shadow:0 8px 32px rgba(0,0,0,0.25);
      backdrop-filter:blur(12px);
      text-align:center;
      animation:fadeIn 0.6s ease;
      z-index:2;
    }

    .login-card h2{
      color:#fff;
      margin-bottom:10px;
      font-size:1.8rem;
      font-weight:700;
      letter-spacing:1px;
    }

    .login-card p{
      color:#ddd;
      font-size:0.9rem;
      margin-bottom:20px;
    }

    .login-card input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:none;
      outline:none;
      margin-bottom:14px;
      font-size:1rem;
      background:rgba(255,255,255,0.85);
    }

    .login-btn{
      width:100%;
      padding:12px;
      border:none;
      background:#d35400;
      color:#fff;
      border-radius:10px;
      cursor:pointer;
      font-size:1.1rem;
      transition:0.25s;
    }
    .login-btn:hover{
      background:#bf4900;
      transform:translateY(-2px);
    }

    .logo{
      width:70px;
      height:70px;
      margin-bottom:10px;
      border-radius:50%;
      box-shadow:0 4px 14px rgba(0,0,0,0.4);
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px);}
      to{opacity:1; transform:translateY(0);}
    }

    @media (max-width:400px){
      .login-card{width:90%;}
    }
  </style>
</head>
<body>

<div class="overlay"></div>

<div class="login-card">
  <img class="logo" src="assets/images/logo.png">

  <h2>E11ven Cafe</h2>
  <p>Admin Dashboard Access</p>

  <input id="adminPass" type="password" placeholder="Enter Admin Password">

  <button class="login-btn" onclick="login()">Login</button>
</div>

<script src="js/data.js"></script>
<script src="js/admin.js"></script>



<script>
const ADMIN_PASSWORD = "admin123"; // CHANGE PASSWORD HERE

function login(){
  let pass = document.getElementById("adminPass").value;
  if(pass === ADMIN_PASSWORD){
    localStorage.setItem("e11_admin_logged_in", "yes");
    window.location.href = "admin.html";
  } else {
    document.getElementById("loginError").innerText = "Incorrect password";
    document.getElementById("loginError").style.display = "block";
  }
}
</script>

</body>
</html>
